apis:
  - aid: sylius:sylius-api
    name: Sylius REST API
    description: The Sylius REST API is built on API Platform and provides endpoints for all core eCommerce operations including product catalog management, order processing, customer management, payment handling, shipment tracking, promotions, and multi-channel shop configuration. Authentication is handled via JWT tokens with separate endpoints for admin and shop users.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
